name: database

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to run this manually for testing

jobs:
  secure-operations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Database Password
        env:
          # Map your GitHub Secret to an Environment Variable
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MY_API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "Connecting to the database..."
          # Use the variable in your command or script
          # Example: python script.py --password $DB_PASSWORD
