name: Secret Environment Variable Example

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Secret as Env Var
        # This maps your GitHub Secret to a local environment variable for this step
        env:
          MY_API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "The step is accessing the secret via the MY_API_KEY environment variable."
          # Note: GitHub automatically masks secrets in logs, so you'll see '***'
          echo "Value: $MY_API_KEY"
